<!DOCTYPE html>
<html>
<head>
    <title>Test Discord Role Removal</title>
</head>
<body>
    <h1>Test Discord Role Removal</h1>
    <button onclick="testRejection()">Test Rejection Function</button>
    <div id="result"></div>

    <script>
        async function testRejection() {
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = 'Testing...';
            
            try {
                const response = await fetch('https://southside-rp.vercel.app/api/test-rejection', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        userId: 'e66a1c28-9d8b-4024-ac20-a676c106e27f',
                        action: 'remove'
                    })
                });
                
                const result = await response.text();
                resultDiv.innerHTML = `<h3>Response:</h3><pre>${result}</pre>`;
            } catch (error) {
                resultDiv.innerHTML = `<h3>Error:</h3><pre>${error.message}</pre>`;
            }
        }
    </script>
</body>
</html>
