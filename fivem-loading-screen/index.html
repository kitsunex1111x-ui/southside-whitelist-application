<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Southside RP - Loading</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(180deg, #050505 0%, #0a0a0a 30%, #111 70%, #0d0d0d 100%);
            color: #fff;
            font-family: 'Impact', 'Arial Black', sans-serif;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* Video Background */
        .video-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
        }

        .video-background video {
            position: absolute;
            top: 50%;
            left: 50%;
            min-width: 100%;
            min-height: 100%;
            width: auto;
            height: auto;
            transform: translate(-50%, -50%);
            object-fit: cover;
            filter: brightness(0.5);
        }

        .video-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(ellipse at center, transparent 0%, rgba(0,0,0,0.4) 70%, rgba(0,0,0,0.8) 100%),
                linear-gradient(180deg, rgba(10,10,10,0.3) 0%, transparent 30%, transparent 70%, rgba(10,10,10,0.5) 100%);
            z-index: 1;
        }

        /* Cinematic rain effect */
        .rain-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 2;
            overflow: hidden;
        }

        .rain-drop {
            position: absolute;
            width: 1px;
            height: 60px;
            background: linear-gradient(to bottom, transparent, rgba(200,200,255,0.4), transparent);
            animation: rainFall linear infinite;
            opacity: 0.3;
        }

        @keyframes rainFall {
            0% { transform: translateY(-100px) translateX(0); }
            100% { transform: translateY(100vh) translateX(-20px); }
        }

        /* Lightning flash */
        .lightning {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255,255,255,0.1);
            opacity: 0;
            pointer-events: none;
            z-index: 3;
            animation: lightning 8s infinite;
        }

        @keyframes lightning {
            0%, 90%, 92%, 100% { opacity: 0; }
            91% { opacity: 0.3; }
            91.5% { opacity: 0; }
            92.5% { opacity: 0.2; }
        }

        /* City skyline silhouette */
        .city-skyline {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 40%;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" preserveAspectRatio="none"><path fill="%23050505" d="M0,400 L0,300 L40,280 L80,290 L120,250 L160,260 L200,220 L240,240 L280,200 L320,180 L360,220 L400,190 L440,210 L480,170 L520,180 L560,150 L600,160 L640,140 L680,155 L720,130 L760,145 L800,120 L840,135 L880,110 L920,125 L960,100 L1000,115 L1040,90 L1080,105 L1120,80 L1160,95 L1200,70 L1200,400 Z"/></svg>');
            background-size: cover;
            background-repeat: no-repeat;
            background-position: bottom;
            pointer-events: none;
            z-index: 5;
            opacity: 0.8;
        }

        /* Neon glow effects */
        .neon-glow {
            position: fixed;
            bottom: 30%;
            left: 10%;
            width: 200px;
            height: 100px;
            background: radial-gradient(ellipse, rgba(220,38,38,0.3) 0%, transparent 70%);
            filter: blur(40px);
            animation: neonPulse 4s ease-in-out infinite;
            pointer-events: none;
            z-index: 4;
        }

        .neon-glow-2 {
            position: fixed;
            bottom: 25%;
            right: 15%;
            width: 150px;
            height: 80px;
            background: radial-gradient(ellipse, rgba(220,38,38,0.2) 0%, transparent 70%);
            filter: blur(30px);
            animation: neonPulse 3s ease-in-out infinite 1s;
            pointer-events: none;
            z-index: 4;
        }

        @keyframes neonPulse {
            0%, 100% { opacity: 0.5; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.1); }
        }

        /* Fog/Mist effect */
        .fog {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 200%;
            height: 50%;
            background: linear-gradient(to top, rgba(10,10,10,0.8) 0%, transparent 100%);
            animation: fogMove 20s linear infinite;
            pointer-events: none;
            z-index: 6;
        }

        @keyframes fogMove {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        /* Wet street reflection effect */
        .reflection {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 15%;
            background: linear-gradient(to top, rgba(220,38,38,0.1) 0%, transparent 100%);
            filter: blur(2px);
            animation: reflectionShimmer 3s ease-in-out infinite;
            pointer-events: none;
            z-index: 5;
        }

        @keyframes reflectionShimmer {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.6; }
        }

        /* Grunge overlay */
        .grunge-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><filter id="noise"><feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="4" stitchTiles="stitch"/></filter><rect width="100%25" height="100%25" filter="url(%23noise)" opacity="0.15"/></svg>');
            pointer-events: none;
            z-index: 100;
            animation: grungeMove 20s linear infinite;
        }

        @keyframes grungeMove {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(-10px, -10px); }
        }

        /* Particles */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: #dc2626;
            border-radius: 50%;
            animation: float 10s infinite;
            opacity: 0.6;
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 0.6;
            }
            90% {
                opacity: 0.6;
            }
            100% {
                transform: translateY(-100vh) rotate(720deg);
                opacity: 0;
            }
        }

        /* Vignette */
        .vignette {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at center, transparent 0%, transparent 50%, rgba(0,0,0,0.8) 100%);
            pointer-events: none;
            z-index: 90;
        }

        /* Logo container */
        .logo-container {
            position: relative;
            z-index: 10;
            margin-bottom: 40px;
            animation: logoReveal 2s ease-out forwards;
        }

        @keyframes logoReveal {
            0% {
                transform: scale(0) rotate(-180deg);
                opacity: 0;
                filter: blur(20px);
            }
            50% {
                filter: blur(0);
            }
            100% {
                transform: scale(1) rotate(0deg);
                opacity: 1;
            }
        }

        .logo {
            width: 200px;
            height: 200px;
            filter: drop-shadow(0 0 15px rgba(220, 38, 38, 0.6));
            animation: logoPulse 4s ease-in-out infinite;
        }

        @keyframes logoPulse {
            0%, 100% {
                filter: drop-shadow(0 0 20px rgba(220, 38, 38, 0.6));
                transform: scale(1);
            }
            50% {
                filter: drop-shadow(0 0 50px rgba(220, 38, 38, 1));
                transform: scale(1.02);
            }
        }

        @keyframes logoGlitch {
            0%, 90%, 100% {
                transform: translate(0);
                filter: drop-shadow(0 0 30px rgba(220, 38, 38, 0.8));
            }
            92% {
                transform: translate(-3px, 2px);
                filter: drop-shadow(5px 0 30px rgba(220, 38, 38, 0.8)) hue-rotate(90deg);
            }
            94% {
                transform: translate(3px, -2px);
                filter: drop-shadow(-5px 0 30px rgba(220, 38, 38, 0.8)) hue-rotate(-90deg);
            }
            96% {
                transform: translate(-2px, 0);
            }
        }

        /* Server name */
        .server-name {
            font-size: 6rem;
            font-weight: 900;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            background: linear-gradient(45deg, #dc2626, #991b1b, #dc2626);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: none;
            animation: textGradient 3s ease infinite, textReveal 1.5s ease-out 0.5s forwards;
            opacity: 0;
            position: relative;
            z-index: 10;
        }

        .server-name::after {
            content: 'SOUTHSIDE';
            position: absolute;
            left: 0;
            top: 0;
            width: 100%;
            -webkit-text-fill-color: transparent;
            background: none;
            text-shadow: 0 0 20px rgba(220, 38, 38, 0.5);
            z-index: -1;
            animation: textShadowPulse 2s ease-in-out infinite;
        }

        @keyframes textGradient {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        @keyframes textReveal {
            0% {
                opacity: 0;
                transform: translateY(50px) scale(0.8);
                letter-spacing: 1em;
            }
            100% {
                opacity: 1;
                transform: translateY(0) scale(1);
                letter-spacing: 0.3em;
            }
        }

        @keyframes textShadowPulse {
            0%, 100% { text-shadow: 0 0 20px rgba(220, 38, 38, 0.3); }
            50% { text-shadow: 0 0 40px rgba(220, 38, 38, 0.8), 0 0 60px rgba(220, 38, 38, 0.4); }
        }

        /* Tagline */
        .tagline {
            font-size: 1.2rem;
            letter-spacing: 0.5em;
            text-transform: uppercase;
            color: #666;
            margin-top: 20px;
            opacity: 0;
            animation: fadeInUp 1s ease-out 1.5s forwards;
            z-index: 10;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Progress bar container */
        .progress-container {
            position: absolute;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            width: 400px;
            z-index: 10;
        }

        .progress-label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 0.9rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: #666;
        }

        .progress-bar {
            width: 100%;
            height: 4px;
            background: #1a1a1a;
            border-radius: 2px;
            overflow: visible;
            position: relative;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #dc2626, #ef4444);
            border-radius: 2px;
            width: 0%;
            transition: width 0.3s ease;
            position: relative;
            box-shadow: 0 0 10px rgba(220, 38, 38, 0.5);
        }

        .progress-fill::after {
            content: '';
            position: absolute;
            right: 0;
            top: -3px;
            width: 10px;
            height: 10px;
            background: #dc2626;
            border-radius: 50%;
            box-shadow: 0 0 20px rgba(220, 38, 38, 1);
        }

        /* Blood drip effect */
        .blood-drip {
            position: absolute;
            top: 100%;
            right: -5px;
            width: 2px;
            height: 0;
            background: linear-gradient(to bottom, #dc2626, transparent);
            animation: drip 2s ease-in-out infinite;
        }

        @keyframes drip {
            0%, 100% { height: 0; }
            50% { height: 20px; }
        }

        /* Loading text */
        .loading-text {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.8rem;
            letter-spacing: 0.3em;
            color: #444;
            z-index: 10;
            animation: loadingPulse 1.5s ease-in-out infinite;
        }

        @keyframes loadingPulse {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 1; }
        }

        /* Audio control */
        .audio-control {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
            background: rgba(0,0,0,0.5);
            border: 1px solid #333;
            padding: 10px 15px;
            border-radius: 5px;
            cursor: pointer;
            color: #666;
            font-size: 0.8rem;
            transition: all 0.3s;
        }

        .audio-control:hover {
            border-color: #dc2626;
            color: #dc2626;
        }

        /* Rules popup */
        .rules-popup {
            position: fixed;
            bottom: 120px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.9);
            border: 1px solid #333;
            padding: 20px;
            border-radius: 10px;
            max-width: 500px;
            opacity: 0;
            animation: rulesIn 1s ease-out 2s forwards;
            z-index: 10;
        }

        @keyframes rulesIn {
            from {
                opacity: 0;
                transform: translateX(-50%) translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
        }

        .rules-popup h3 {
            color: #dc2626;
            font-size: 1rem;
            margin-bottom: 10px;
            letter-spacing: 0.2em;
            text-transform: uppercase;
        }

        .rules-popup p {
            color: #666;
            font-size: 0.85rem;
            line-height: 1.6;
            font-family: Arial, sans-serif;
        }

        /* Scanline effect */
        .scanlines {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(0, 0, 0, 0.1) 2px,
                rgba(0, 0, 0, 0.1) 4px
            );
            pointer-events: none;
            z-index: 99;
            opacity: 0.3;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .server-name {
                font-size: 3rem;
                letter-spacing: 0.2em;
            }
            .logo {
                width: 150px;
                height: 150px;
            }
            .progress-container {
                width: 300px;
            }
        }
    </style>
</head>
<body>
    <!-- Audio control -->
    <div class="audio-control" onclick="toggleMusic()">
        🎵 Click for Music
    </div>

    <!-- Audio element (add your music file) -->
    <audio id="bgMusic" loop>
        <!-- Replace with your music file -->
        <source src="music.mp3" type="audio/mpeg">
    </audio>

    <!-- Video Background -->
    <div class="video-background">
        <video autoplay muted loop playsinline id="bgVideo">
            <!-- Add your video file here -->
            <source src="background.mp4" type="video/mp4">
        </video>
        <div class="video-overlay"></div>
    </div>

    <!-- Cinematic Effects -->
    <div class="rain-container" id="rain"></div>
    <div class="lightning"></div>
    <div class="city-skyline"></div>
    <div class="neon-glow"></div>
    <div class="neon-glow-2"></div>
    <div class="fog"></div>
    <div class="reflection"></div>
    
    <!-- Effects -->
    <div class="scanlines"></div>
    <div class="grunge-overlay"></div>
    <div class="vignette"></div>
    
    <!-- Particles -->
    <div class="particles" id="particles"></div>

    <!-- Logo -->
    <div class="logo-container">
        <img src="logo.png" alt="Southside Logo" class="logo" id="logo">
    </div>

    <!-- Server Name -->
    <h1 class="server-name">SOUTHSIDE</h1>
    <p class="tagline">The Streets Remember</p>

    <!-- Rules Popup -->
    <div class="rules-popup">
        <h3>⚠️ Server Rules</h3>
        <p>• Respect all players and staff<br>
        • No RDM or VDM<br>
        • Roleplay over gunplay<br>
        • Use Discord for support</p>
    </div>

    <!-- Progress Bar -->
    <div class="progress-container">
        <div class="progress-label">
            <span>Loading Assets</span>
            <span id="progress-text">0%</span>
        </div>
        <div class="progress-bar">
            <div class="progress-fill" id="progress-fill">
                <div class="blood-drip"></div>
            </div>
        </div>
    </div>

    <p class="loading-text">INITIALIZING SOUTHSIDE EXPERIENCE...</p>

    <script>
        // Create rain drops (reduced from 150 to 30 for performance)
        const rainContainer = document.getElementById('rain');
        for (let i = 0; i < 30; i++) {
            const drop = document.createElement('div');
            drop.className = 'rain-drop';
            drop.style.left = Math.random() * 100 + '%';
            drop.style.animationDelay = Math.random() * 2 + 's';
            drop.style.animationDuration = (0.5 + Math.random() * 0.5) + 's';
            drop.style.opacity = 0.1 + Math.random() * 0.3;
            rainContainer.appendChild(drop);
        }

        // Create particles (reduced from 50 to 15 for performance)
        const particlesContainer = document.getElementById('particles');
        for (let i = 0; i < 15; i++) {
            const particle = document.createElement('div');
            particle.className = 'particle';
            particle.style.left = Math.random() * 100 + '%';
            particle.style.animationDelay = Math.random() * 10 + 's';
            particle.style.animationDuration = (10 + Math.random() * 10) + 's';
            particlesContainer.appendChild(particle);
        }

        // Music toggle
        let musicPlaying = false;
        function toggleMusic() {
            const audio = document.getElementById('bgMusic');
            const btn = document.querySelector('.audio-control');
            
            if (musicPlaying) {
                audio.pause();
                btn.textContent = '🎵 Click for Music';
            } else {
                audio.play().catch(e => console.log('Audio play failed:', e));
                btn.textContent = '🔊 Music On';
            }
            musicPlaying = !musicPlaying;
        }

        // Simulate loading progress
        let progress = 0;
        const progressFill = document.getElementById('progress-fill');
        const progressText = document.getElementById('progress-text');

        function updateProgress() {
            progress += Math.random() * 2;
            if (progress > 100) progress = 100;
            
            progressFill.style.width = progress + '%';
            progressText.textContent = Math.floor(progress) + '%';

            if (progress < 100) {
                setTimeout(updateProgress, 100 + Math.random() * 200);
            }
        }

        // Start progress after animations
        setTimeout(updateProgress, 2000);

        // FiveM loading screen compatibility
        if (typeof window.invokeNative === 'function') {
            // We're in FiveM
            window.addEventListener('message', function(e) {
                if (e.data.eventName === 'loadProgress') {
                    progress = e.data.loadFraction * 100;
                    progressFill.style.width = progress + '%';
                    progressText.textContent = Math.floor(progress) + '%';
                }
            });
        }
    </script>
</body>
</html>
